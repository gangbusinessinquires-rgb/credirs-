version: "3"

services:

  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - backend/.env
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ptero
    ports:
      - "5432:5432"
